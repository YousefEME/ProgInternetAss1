        <div class="flashcard-container" id="container"></div>
    <div id="counter">Total cards: 0</div>
    <div class="controls">
        <button onclick="prevFlashcard()">Previous</button>
        <button onclick="nextFlashcard()">Next</button>
        <button onclick="addFlashcard()">Add</button>
        <button onclick="deleteFlashcard()">Delete</button>
    </div>

    <script>
        let currentFlashcardIndex = 0;
        const flashcards = document.querySelectorAll('.flashcard');

        function flipCard(card) {
            const question = card.querySelector('.content:not(.hidden)');
            const answer = card.querySelector('.content.hidden');

            question.classList.add('hidden');
            answer.classList.remove('hidden');
        }

        function showFlashcard(index) {
            flashcards.forEach((card, i) => {
                card.classList.remove('active');
                if (i === index) {
                    card.classList.add('active');
                }
            });
        }

        function nextFlashcard() {
            const cards = document.querySelectorAll('.flashcard');
            if (cards.length === 0) return;
        cards[currentFlashcardIndex].classList.remove('active');
        currentFlashcardIndex = (currentFlashcardIndex + 1) % cards.length;
        cards[currentFlashcardIndex].classList.add('active');
}

        function prevFlashcard() {
            const cards = document.querySelectorAll('.flashcard');
            if (cards.length === 0) return;

            cards[currentFlashcardIndex].classList.remove('active');
            currentFlashcardIndex = (currentFlashcardIndex - 1 + cards.length) % cards.length;
            cards[currentFlashcardIndex].classList.add('active');
}

        function addFlashcard() {
            const question = prompt("Enter question:");
            const answer = prompt("Enter answer:");

            fetch('http://localhost:3000/cards', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question, answer })
    })
    .then(() => loadCards());

}
        

        function deleteFlashcard() {
            const cards = document.querySelectorAll('.flashcard');
            const currentCard = cards[currentFlashcardIndex];
            if (!currentCard) return;
            const id = currentCard.dataset.id;


    fetch(`http://localhost:3000/cards/${id}`, {
        method: 'DELETE'
    }).then(() => loadCards());
}
        showFlashcard(currentFlashcardIndex);

        function loadCards() {

            fetch('http://localhost:3000/cards')

            .then(res => res.json())
            .then(data => {

                const container = document.getElementById('container');
                container.innerHTML = "";

            data.forEach((card, index) => {

                const div = document.createElement('div');
                div.className = 'flashcard';
                div.dataset.id = card.id;

                if (index === 0) div.classList.add('active');
                div.onclick = () => flipCard(div);

                div.innerHTML = `
                    <div class="content">${card.question}</div>
                    <div class="content hidden">${card.answer}</div>
                `;

                container.appendChild(div);
            });

            currentFlashcardIndex = 0;
            updateCounter(data.length);
        });
}

        function updateCounter(count) {
            document.getElementById('counter').textContent =
            "Total cards: " + count;
}

        loadCards();

    //     if (!question || !answer) {
    // alert("Please enter both fields");
    // return;
// }
    </script>

</body>
