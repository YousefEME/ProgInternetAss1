<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"> <!-- link to css file-->
    <script src="script.js" defer></script> <!-- link to javascript file-->
    <title>CardFlash</title>
    <img src="CardFlash Logo.png" alt="Cardflash Logo">

</head>

<body>
    <h1 class="title">CardFlash</h1>
    <p class="subtitle">Memorise flashcards in a flash</p>
    <div class="add-flashcard">
        <input type="text" id="new-question" placeholder="Enter question">
        <input type="text" id="new-answer" placeholder="Enter answer">
        <button onclick="addFlashcard()">Add Flashcard</button>
    </div>

    <div class="flashcard-container" id="container"></div>
    <div id="counter">Total cards: 0</div>
    <div class="controls">
        <button onclick="prevFlashcard()">Previous</button>
        <button onclick="nextFlashcard()">Next</button>
        <button onclick="deleteFlashcard()">Delete</button>
    </div>

</body></html>
