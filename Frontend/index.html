<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin: 0;
            background-color: #ffffff;
        }
        .flashcard-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px;
        }
        .flashcard {
            width: 300px;
            height: 200px;
            background: #03c7ee;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: none;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s ease;
            position: relative;
        }
        .flashcard.active {
            display: flex;
        }
        .hidden {
            display: none;
        }
        .content {
            position: absolute;
        }
        .controls {
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #03c7ee;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #0294b5;
        }
    </style>
</head>
<body>
    <div class="flashcard-container">
        <div class="flashcard active" onclick="flipCard(this)">
            <div class="content" id="question-1">What is the capital of France?</div>
            <div class="content hidden" id="answer-1">Paris</div>
        </div>
        <div class="flashcard" onclick="flipCard(this)">
            <div class="content" id="question-2">What is 2 + 2?</div>
            <div class="content hidden" id="answer-2">4</div>
        </div>
        <div class="flashcard" onclick="flipCard(this)">
            <div class="content" id="question-3">What is the largest planet?</div>
            <div class="content hidden" id="answer-3">Jupiter</div>
        </div>
    </div>

    <div class="controls">
        <button onclick="prevFlashcard()">Previous</button>
        <button onclick="nextFlashcard()">Next</button>
        <button onclick="addFlashcard()">Add</button>
        <button onclick="deleteFlashcard()">Delete</button>
    </div>

    <script>
        let currentFlashcardIndex = 0;
        const flashcards = document.querySelectorAll('.flashcard');

        function flipCard(card) {
            const question = card.querySelector('.content:not(.hidden)');
            const answer = card.querySelector('.content.hidden');

            question.classList.add('hidden');
            answer.classList.remove('hidden');
        }

        function showFlashcard(index) {
            flashcards.forEach((card, i) => {
                card.classList.remove('active');
                if (i === index) {
                    card.classList.add('active');
                }
            });
        }

        function nextFlashcard() {
            currentFlashcardIndex = (currentFlashcardIndex + 1) % flashcards.length;
            showFlashcard(currentFlashcardIndex);
        }

        function prevFlashcard() {
            currentFlashcardIndex = (currentFlashcardIndex - 1 + flashcards.length) % flashcards.length;
            showFlashcard(currentFlashcardIndex);
        }

        function addFlashcard() {
            const question = prompt("Enter the question:");
            const answer = prompt("Enter the answer:");
            if (question && answer) {
                const newFlashcard = document.createElement('div');
                newFlashcard.className = 'flashcard';
                newFlashcard.setAttribute('onclick', 'flipCard(this)');
                newFlashcard.innerHTML = `
                    <div class="content">${question}</div>
                    <div class="content hidden">${answer}</div>
                `;
                document.querySelector('.flashcard-container').appendChild(newFlashcard);
                flashcards[currentFlashcardIndex].classList.remove('active');
                currentFlashcardIndex = flashcards.length;
                newFlashcard.classList.add('active');
            }
        }

        function deleteFlashcard() {
            if (flashcards.length > 0) {
                const currentFlashcard = flashcards[currentFlashcardIndex];
                currentFlashcard.remove();
                currentFlashcardIndex = Math.max(0, currentFlashcardIndex - 1);
                showFlashcard(currentFlashcardIndex);
            } else {
                alert("No flashcards to delete!");
            }
        }

        showFlashcard(currentFlashcardIndex);
    </script>

</body>
</html>
